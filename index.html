<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Human Origin — Tom Waldek</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F1A24;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Futura','Century Gothic','Avenir','Trebuchet MS',sans-serif;overflow:hidden;position:relative}
.bg{position:fixed;inset:0;z-index:0}
.bg div{position:absolute;inset:0}
.wrap{position:relative;z-index:1;text-align:center;padding:24px}
.the{font-weight:100;font-size:28px;color:rgba(168,176,204,0.4);letter-spacing:8px;display:block}
.origin{font-weight:700;font-size:52px;color:rgba(232,184,164,0.85);letter-spacing:7px;display:block;margin-top:4px}
.line{width:44px;height:1.5px;background:rgba(204,112,88,0.35);margin:24px auto}
.hook{font-weight:200;font-size:16px;color:rgba(168,176,204,0.5);line-height:1.75;max-width:460px;margin:0 auto 36px}
.hook span{display:block;font-size:14px;color:rgba(168,176,204,0.35);margin-top:4px}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.links a{display:block;border:1px solid rgba(204,112,88,0.35);padding:16px 44px;font-family:inherit;font-weight:500;font-size:11px;letter-spacing:4px;color:rgba(204,112,88,0.7);text-transform:uppercase;text-decoration:none;transition:all 0.3s;background:transparent}
.links a:hover{background:rgba(204,112,88,0.15);color:rgba(232,184,164,0.9)}
.foot{position:fixed;bottom:28px;left:0;right:0;text-align:center;z-index:1}
.foot p{font-weight:200;font-size:11px;color:rgba(74,88,120,0.4);letter-spacing:1px}
.fi{opacity:0;transform:translateY(20px);animation:fi 0.8s cubic-bezier(0.22,1,0.36,1) forwards}
.fi:nth-child(2){animation-delay:0.15s}
.fi:nth-child(3){animation-delay:0.3s}
.fi:nth-child(4){animation-delay:0.45s}
.fi:nth-child(5){animation-delay:0.6s}
@keyframes fi{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg">
<div style="background:radial-gradient(ellipse 60% 50% at 30% 55%,rgba(204,112,88,0.2) 0%,transparent 70%)"></div>
<div style="background:radial-gradient(ellipse 80% 30% at 50% 85%,rgba(232,200,160,0.1) 0%,transparent 70%)"></div>
<div style="background:radial-gradient(ellipse 90% 60% at 70% 30%,rgba(45,80,110,0.25) 0%,transparent 60%)"></div>
</div>
<div class="wrap">
<span class="the fi">THE HUMAN</span>
<span class="origin fi">ORIGIN</span>
<div class="line fi"></div>
<p class="hook fi">Every organisation runs on a script nobody wrote.<span>Jede Organisation folgt einem Skript, das niemand geschrieben hat.</span></p>
<div class="links fi">
<a href="en/">English</a>
<a href="de/">Deutsch</a>
</div>
</div>
<div class="foot"><p>Six disciplines. Applied neurobiology.</p></div>
</body>
</html>
